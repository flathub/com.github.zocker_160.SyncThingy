# shamelessly copied from https://github.com/flathub/org.freedesktop.Sdk.Extension.golang
name: golang1.25
modules:
  - name: golang
    buildsystem: simple
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://go.dev/dl/go1.25.7.linux-amd64.tar.gz
        sha256: 12e6d6a191091ae27dc31f6efc630e3a3b8ba409baf3573d955b196fdf086005
      - type: archive
        only-arches:
          - aarch64
        url: https://go.dev/dl/go1.25.7.linux-arm64.tar.gz
        sha256: ba611a53534135a81067240eff9508cd7e256c560edd5d8c2fef54f083c07129
    build-commands:
      - install -d ${FLATPAK_DEST}/lib/sdk/golang
      - cp -rpv * ${FLATPAK_DEST}/lib/sdk/golang/

  - name: scripts
    sources:
      - type: script
        commands:
          - export GOROOT=${FLATPAK_DEST}/lib/sdk/golang
          - export PATH=$PATH:$GOROOT/bin
        dest-filename: enable.sh
    buildsystem: simple
    build-commands:
      - cp enable.sh ${FLATPAK_DEST}/lib/sdk/golang/
